<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>承認処理</title>
  <script charset="utf-8" src="https://static.worksmobile.net/static/wm/woff/edge/sdk.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; margin-top: 50px; background-color: #f5f5f5; }
    .container { background: #fff; padding: 30px 20px; border-radius: 12px; margin: 0 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    #status-icon { font-size: 40px; margin-bottom: 10px; }
    #message { font-size: 16px; color: #333; font-weight: bold; }
    #sub-message { font-size: 12px; color: #666; margin-top: 10px; word-break: break-all; }
  </style>
</head>
<body>
  <div class="container">
    <div id="status-icon">⏳</div>
    <div id="userInfoDisplay" class="user-info">
    <div id="message">認証情報を取得中...</div>
    <div id="sub-message">画面を閉じずにお待ちください</div>
  </div>

  <script>
// ⚠️ あなたのIDとURLに書き換えてください
    const WOFF_ID = "fwks1vLA5ED1cQGHnGkpnQ";
    const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbz2_fHa_RIfgUo2tsl38mJtTs-x93N8AUUvaYlb4qlK1HQa8xY9yKb_RNZ2r2zlVyeq/exec";

   window.onerror = function(msg, url, line) {
      showError("システムエラー: " + msg);
      return true;
    };

    // 💡 修正ポイント2：SDKがブロックされるなどの通信エラー時の表示
    function showSdkError() {
      showError("SDKの読み込みに失敗しました。通信環境や広告ブロック設定を確認してください。");
    }

    // 💡 修正ポイント3：SDKの準備が「完全に」整ってから呼ばれる関数
    function startWoff() {
      woff.init({ woffId: WOFF_ID })
        .then(() => {
          document.getElementById("message").innerText = "承認処理を実行中...";
          processApproval();
        })
        .catch((err) => {
          showError("WOFF初期化エラー(LINE WORKSアプリ内で開いてください): " + err.message);
        });
    }

    function processApproval() {
      const urlParams = new URLSearchParams(window.location.search);
      const requestId = urlParams.get('id');
      const action = urlParams.get('action');

      if (!requestId || action !== "approve") {
        showError("無効なリクエストです。(ID不足)");
        return;
      }

      woff.getProfile().then((profile) => {
        const payload = {
          type: "woff_approve",
          id: requestId,
          approverName: profile.displayName,
          approverId: profile.userId
        };

        fetch(GAS_WEBAPP_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(payload)
        })
        .then(response => {
          if (!response.ok) throw new Error("GAS通信エラー " + response.status);
          return response.json();
        })
        .then(data => {
          if (data.success) {
            document.getElementById("status-icon").innerText = "✅";
            document.getElementById("message").innerText = "承認が完了しました！";
            document.getElementById("message").style.color = "#4CAF50";
            document.getElementById("sub-message").innerText = "自動的に画面が閉じます...";
            setTimeout(() => { woff.closeWindow(); }, 1500);
          } else {
            showError("サーバーエラー: " + data.error);
          }
        })
        .catch(err => showError("通信に失敗しました: " + err.message));
      }).catch(err => showError("プロフィールの取得に失敗: " + err.message));
    }

    function showError(text) {
      document.getElementById("status-icon").innerText = "❌";
      document.getElementById("message").innerText = text;
      document.getElementById("message").style.color = "#F44336";
      document.getElementById("sub-message").innerText = "右上の✕で閉じてください";
    }
  </script>
</body>
</html>
