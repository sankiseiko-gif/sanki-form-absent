<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>グループ承認リスト</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <script charset="utf-8" src="https://static.worksmobile.net/static/wm/woff/edge/3.7.1/sdk.js"></script>
  <style>
    body { background-color: #f4f5f7; }
    .container { max-width: 640px; margin-top: 20px; margin-bottom: 20px; padding: 0 15px;}
    .user-info { background: #f0fdf4; border-left: 4px solid #00B900; padding: 12px; border-radius: 4px; margin-bottom: 20px; font-weight: bold; color: #333; font-size: 0.9rem;}
    .card { border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #eee; }
    .card-header-title { background-color: #fff; border-bottom: 1px solid #f5f5f5; color: #333; font-size: 1rem;}
    .content p { margin-bottom: 0.5em !important; font-size: 0.9rem;}
    .empty-message { text-align: center; padding: 40px 20px; color: #888; background: #fff; border-radius: 8px; font-weight: bold;}
    #statusMessage { text-align: center; margin-bottom: 15px; font-size: 0.9rem; font-weight: bold; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title is-5 has-text-centered mt-2">未承認リスト</h1>
    <div id="statusMessage">⏳ WOFFを起動中...</div>

    <div id="userInfoDisplay" class="user-info" style="display: none;"></div>

<div id="userInfoDisplay" class="user-info" style="display: none;"></div>

<div id="manualNameField" class="box" style="display: none; background-color: #fffbeb; border: 1px solid #f59e0b; margin-bottom: 20px;">
  <p class="help is-warning has-text-weight-bold mb-2">
    ⚠️ ユーザー情報の自動取得に失敗しました。承認者名を手動で入力してください。
  </p>
  <div class="field has-addons">
    <div class="control is-expanded">
      <input class="input" type="text" id="manualApproverName" placeholder="お名前を入力（例：三基太郎）">
    </div>
    <div class="control">
      <button type="button" class="button is-warning" id="setManualNameBtn">次へ</button>
    </div>
  </div>
</div>
    
    <div id="approvalList"></div>
  </div>

  <script>
    // ⚠️ あなたのWOFF IDとGAS URLに書き換えてください
    const WOFF_ID = "fwks1vLA5ED1cQGHnGkpnQ"; 
    const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbz2_fHa_RIfgUo2tsl38mJtTs-x93N8AUUvaYlb4qlK1HQa8xY9yKb_RNZ2r2zlVyeq/exec";

    let globalApproverName = "";

     function startFetching() {
        showStatus("⏳ 未承認データを取得中...");
        fetchAllPendingApprovals(); // GASに未承認リストを要求
      }
    
    window.addEventListener('load', () => {
      if (typeof woff !== 'undefined' && woff.init) {
        woff.init({ woffId: WOFF_ID })
          .then(() => woff.getProfile())
          .then(profile => {
            globalApproverName = profile.displayName;
            document.getElementById('userInfoDisplay').innerText = `ログイン中: ${globalApproverName}`;
            document.getElementById('userInfoDisplay').style.display = "block";
            startFetching(); // データ取得開始
          })
          .catch(err => {
            // 自動取得エラー時のルート（PCからのアクセス等）
            console.error(err);
            showStatus("名前を手動入力してください。", "red");
            document.getElementById('manualNameField').style.display = "block"; // 手動入力欄を表示
          });
      } else {
        // そもそもWOFF SDKが読み込めなかった時のルート
        showStatus("名前を手動入力してください。", "red");
        document.getElementById('manualNameField').style.display = "block"; // 手動入力欄を表示
      }
    });

    // ====================================================
    //  手動入力で「次へ」ボタンを押した時の処理
    // ====================================================
    document.addEventListener('DOMContentLoaded', () => {
      const setManualNameBtn = document.getElementById('setManualNameBtn');
      if (setManualNameBtn) {
        setManualNameBtn.addEventListener('click', () => {
          const inputName = document.getElementById('manualApproverName').value.trim();
          
          if (!inputName) {
            alert("お名前を入力してください。");
            return;
          }

          // グローバル変数に手動入力した名前をセット
          globalApproverName = inputName;
          
          // UIの表示を更新して、入力欄を隠す
          document.getElementById('userInfoDisplay').innerText = `ログイン中（手動入力）: ${globalApproverName}`;
          document.getElementById('userInfoDisplay').style.display = "block";
          document.getElementById('manualNameField').style.display = "none";

          startFetching(); // データ取得開始
        });
      }
    });


    
    // 💡 GASから「全員の未承認リスト」を取得
    function fetchAllPendingApprovals() {
      fetch(GAS_WEBAPP_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ type: "woff_fetch_all_pending" })
      })
      .then(res => res.json())
      .then(result => {
        if (result.success) {
          renderList(result.data);
        } else {
          showStatus("❌ エラー: " + result.error, "red");
        }
      })
      .catch(err => showStatus("❌ 通信エラー", "red"));
    }

    // 💡 取得したリストを画面に表示
    function renderList(items) {
      const listContainer = document.getElementById('approvalList');
      listContainer.innerHTML = ""; 
      showStatus(""); 

      if (items.length === 0) {
        listContainer.innerHTML = `<div class="empty-message">🎉 現在、未承認の申請はありません。</div>`;
        return;
      }

      items.forEach(item => {
        const cardHtml = `
          <div class="card" id="card-${item.id}">
            <header class="card-header">
              <p class="card-header-title">👤 ${item.requester} さんの申請</p>
            </header>
            <div class="card-content py-3">
              <div class="content">
                <p><strong>種別:</strong> ${item.type}</p>
                <p><strong>区分:</strong> ${item.category}</p>
                <p><strong>期間:</strong> ${item.period}</p>
              </div>
            </div>
            <footer class="card-footer">
              <a href="#" class="card-footer-item has-text-success has-text-weight-bold" onclick="approveRequest('${item.id}'); return false;" id="btn-${item.id}">承認する</a>
            </footer>
          </div>
        `;
        listContainer.insertAdjacentHTML('beforeend', cardHtml);
      });
    }

    // 💡 画面内の承認ボタンを押した時（シートの管理用IDをGASに送る）
    function approveRequest(requestId) {
      const btn = document.getElementById(`btn-${requestId}`);
      btn.innerText = "⏳ 処理中...";
      btn.style.pointerEvents = "none";
      btn.classList.remove('has-text-success');
      btn.classList.add('has-text-grey');

      const payload = {
        type: "woff_approve",
        id: requestId, // 画面上で選択したシートの管理用ID
        approverName: globalApproverName // 開いている人の名前
      };

      fetch(GAS_WEBAPP_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(result => {
        if (result.success) {
          btn.innerText = "✅ 承認完了！";
          btn.classList.add('has-text-info');
          setTimeout(() => {
            document.getElementById(`card-${requestId}`).style.display = "none";
            // もしリストが空になったらメッセージを表示
            if (document.querySelectorAll('.card[style*="display: none"]').length === document.querySelectorAll('.card').length) {
              document.getElementById('approvalList').innerHTML = `<div class="empty-message">🎉 すべての承認が完了しました！</div>`;
              setTimeout(() => { if(woff.closeWindow) woff.closeWindow(); }, 1500);
            }
          }, 1000);
        } else {
          alert("エラー: " + result.error);
          btn.innerText = "承認する";
          btn.style.pointerEvents = "auto";
        }
      })
      .catch(err => {
        alert("通信エラーが発生しました。");
        btn.innerText = "承認する";
        btn.style.pointerEvents = "auto";
      });
    }

    function showStatus(text, color = "#666") {
      const el = document.getElementById('statusMessage');
      el.innerText = text;
      el.style.color = color;
    }
  </script>
</body>
</html>
