<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>総務承認管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.worksmobile.net/static/wm/woff/edge/3.7.1/sdk.js"></script>
    <style>
        body { font-family: sans-serif; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.5s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <div class="bg-red-700 text-white text-center py-4 shadow-md mb-4">
        <h1 class="font-bold text-lg">休暇申請 - 最終承認 (総務用)</h1>
    </div>

    <div id="loading" class="fixed inset-0 bg-white bg-opacity-80 flex justify-center items-center z-50 hidden">
        <div class="flex flex-col items-center"><div class="loader mb-2"></div><p id="loadingText" class="text-sm text-gray-600 font-bold">通信中...</p></div>
    </div>

    <main class="px-4 pb-8 max-w-lg mx-auto">
        <div id="authArea" class="bg-white p-5 rounded-lg shadow-sm border border-red-200 mb-5 hidden">
            <p class="text-sm font-bold text-red-600 mb-3">自動認証に失敗しました。<br>権限を確認するため、氏名を入力して連携してください。</p>
            <div class="flex gap-2">
                <input type="text" id="userName" class="flex-1 border border-gray-300 rounded p-2 text-sm" placeholder="漢字で氏名を入力">
                <button onclick="authenticateByName()" class="bg-red-600 hover:bg-red-700 text-white font-bold px-4 rounded shadow">連携</button>
            </div>
            <!-- ここにデバッグ情報が出現します -->
            <div id="debugLogArea"></div>
        </div>

        <section id="approveArea" class="hidden">
            <div class="flex justify-between items-center mb-3">
                <h3 class="font-bold text-gray-700">最終確認待ち一覧</h3>
                <span class="text-xs bg-red-100 text-red-700 px-2 py-1 rounded-full font-bold border border-red-200" id="approverName"></span>
            </div>
            <div id="approveList" class="space-y-4 mb-8"></div>

            <div class="flex justify-between items-center mb-3 pt-4 border-t border-gray-300">
                <h3 class="font-bold text-gray-600">上長未承認 (確認用)</h3>
            </div>
            <div id="pendingManagerList" class="space-y-4"></div>
        </section>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxwEuHjXVsUjbhH9Bo5yQ3vgln5LM615sKftO5pQgzjpPzpRvXuxMcqmyNTNhEhaQeZ/exec";
        const WOFF_ID = "H00GMadPm09uj7QukuKCCw"; 
        
        let currentUser = { id: "", name: "", role: "" };

        // 🚨 画面上にエラー原因を表示するためのヘルパー関数
        function showErrorLog(message, errDetails = "") {
            const authArea = document.getElementById('authArea');
            authArea.classList.remove('hidden');
            
            const logArea = document.getElementById('debugLogArea');
            const errText = errDetails ? JSON.stringify(errDetails, Object.getOwnPropertyNames(errDetails)) : "";
            
            logArea.innerHTML = `<div class="mt-4 p-3 bg-red-50 border border-red-300 rounded text-xs text-red-700 break-all">
                <span class="font-bold block mb-1">【デバッグ情報】</span>
                ${message}<br><span class="text-gray-500 mt-1 block">${errText}</span>
            </div>`;
            showLoading(false);
        }

        // 確実な読み込みイベントから処理をスタート
        window.addEventListener('load', () => {
            if (typeof woff === 'undefined') {
                showErrorLog("WOFF SDKが読み込まれていません。通信環境を確認してください。");
                return;
            }

            woff.init({ woffId: WOFF_ID })
                .then(() => {
                    if (!woff.isLoggedIn()) {
                        // 未ログインならログインを促す
                        woff.login();
                    } else {
                        // ログイン済みならプロファイルを取得
                        woff.getProfile()
                            .then(profile => {
                                currentUser.id = profile.userId;
                                initApp(); // 成功したらGASへ
                            })
                            .catch(err => {
                                showErrorLog("プロファイルの取得に失敗しました。", err);
                            });
                    }
                })
                .catch(err => {
                    showErrorLog("WOFFの初期化(init)に失敗しました。WOFF IDに誤りがないか確認してください。", err);
                });
        });

        async function fetchGasPost(action, payload) {
            const res = await fetch(GAS_URL, {
                method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ action, payload })
            });
            return res.json();
        }

        function showLoading(show, text = "通信中...") {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }

        async function initApp() {
            showLoading(true, "権限を確認中...");
            try {
                const json = await fetchGasPost('getUser', { userId: currentUser.id });
                if (json.status === 'success' && json.data.userName) {
                    currentUser.name = json.data.userName;
                    currentUser.role = json.data.role;
                    verifyRoleAndLoad();
                } else throw new Error("マスタにユーザー情報が存在しません");
            } catch (e) {
                showErrorLog("GASとの通信、またはユーザー情報の取得に失敗しました。", e.message);
            } finally { showLoading(false); }
        }

        async function authenticateByName() {
            const nameInput = document.getElementById('userName').value.trim();
            if (!nameInput) return alert("氏名を入力してください。");
            showLoading(true, "連携中...");
            try {
                const json = await fetchGasPost('getUserByName', { userName: nameInput });
                if (json.status === 'success' && json.data) {
                    currentUser.id = json.data.userId;
                    currentUser.name = json.data.userName;
                    currentUser.role = json.data.role;
                    verifyRoleAndLoad();
                } else alert("マスタに該当する名前が見つかりません。");
            } catch (e) { alert("通信エラー"); }
            finally { showLoading(false); }
        }

        function verifyRoleAndLoad() {
            if (currentUser.role === '総務') {
                document.getElementById('authArea').classList.add('hidden');
                document.getElementById('approveArea').classList.remove('hidden');
                document.getElementById('approverName').innerText = currentUser.name;
                fetchListData();
            } else {
                alert("この画面へアクセスする権限がありません。");
                if (typeof woff !== 'undefined' && woff.closeWindow) woff.closeWindow();
            }
        }

        async function fetchListData() {
            showLoading(true, "リストを取得中...");
            try {
                const json = await fetchGasPost('getList', { userId: currentUser.id, role: '総務' });
                if (json.status === 'success') renderApproveList(json.data);
            } catch (e) { alert("取得失敗"); } 
            finally { showLoading(false); }
        }

        function renderApproveList(list) {
            const approveContainer = document.getElementById('approveList');
            const pendingContainer = document.getElementById('pendingManagerList');

            const readyToApprove = list.filter(item => item.status === '上長承認' || item.status === '仮取り消し');
            const pendingManager = list.filter(item => item.status === '仮申請');

            if (readyToApprove.length === 0 && pendingManager.length === 0) {
                approveContainer.innerHTML = `<div class="bg-red-50 border border-red-200 p-6 rounded-lg text-center fade-in">
                    <p class="text-red-700 font-bold text-lg mb-1">🎉 すべての処理が完了しました！</p>
                    <p class="text-red-600 text-xs">画面を閉じます...</p>
                </div>`;
                pendingContainer.innerHTML = '';
                setTimeout(() => { if(typeof woff !== 'undefined' && woff.closeWindow) woff.closeWindow(); }, 2000);
                return;
            }

            const buildCardContent = (item) => `
                <div class="grid grid-cols-2 gap-2 text-sm text-gray-700 mb-4 bg-gray-50 p-3 rounded">
                    <div><span class="font-bold text-gray-500 text-xs block mb-0.5">種別</span>${item.type || '未指定'}</div>
                    <div><span class="font-bold text-gray-500 text-xs block mb-0.5">区分</span>${item.category}</div>
                    
                    <div class="col-span-2">
                        <span class="font-bold text-gray-500 text-xs block mb-0.5">対象日時</span>
                        ${item.startDate} <span class="text-gray-500">(${item.startTime} ～ ${item.endTime})</span>
                    </div>
                    
                    ${item.compDate ? `
                    <div class="col-span-2">
                        <span class="font-bold text-red-400 text-xs block mb-0.5">振替対象日</span>
                        <span class="font-bold text-red-600">${item.compDate}</span>
                    </div>` : ''}
                    
                    <div class="col-span-2 mt-1">
                        <span class="font-bold text-gray-500 text-xs block mb-0.5">理由</span>
                        <div class="whitespace-pre-wrap">${item.reason || 'なし'}</div>
                    </div>
                </div>
            `;

            if (readyToApprove.length === 0) {
                approveContainer.innerHTML = `<div class="bg-white border border-gray-200 p-4 rounded-lg text-center shadow-sm">
                    <p class="text-gray-500 text-sm font-bold">総務の処理待ち申請はありません</p>
                </div>`;
            } else {
                approveContainer.innerHTML = readyToApprove.map(item => `
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200 border-l-4 border-l-red-500" id="card-${item.uid}">
                        <div class="flex justify-between items-center mb-3">
                            <span class="font-bold text-gray-800 text-lg">${item.userName}</span>
                            <span class="text-xs font-bold text-red-600 bg-red-50 px-2 py-1 rounded-full border border-red-100">${item.status}</span>
                        </div>
                        
                        ${buildCardContent(item)}

                        <button id="btn-${item.uid}" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold rounded-md py-3 transition shadow disabled:bg-gray-400" 
                            onclick="approveRequest('${item.uid}')">${item.status === '仮取り消し' ? '取消を承認する' : '確定承認する'}</button>
                    </div>
                `).join('');
            }

            if (pendingManager.length === 0) {
                pendingContainer.innerHTML = `<div class="bg-transparent p-2 text-center">
                    <p class="text-gray-400 text-xs">現在、上長未承認の申請はありません</p>
                </div>`;
            } else {
                pendingContainer.innerHTML = pendingManager.map(item => `
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200 border-l-4 border-l-gray-400" id="card-${item.uid}">
                        <div class="flex justify-between items-center mb-3">
                            <span class="font-bold text-gray-800 text-lg">${item.userName}</span>
                            <span class="text-xs font-bold text-gray-600 bg-gray-100 px-2 py-1 rounded-full border border-gray-200">上長待ち</span>
                        </div>
                        
                        ${buildCardContent(item)}

                        <button id="btn-${item.uid}" class="w-full bg-gray-500 hover:bg-red-600 text-white font-bold rounded-md py-3 transition shadow disabled:bg-gray-400 text-sm" 
                            onclick="approveRequest('${item.uid}')">特権で強制承認する</button>
                    </div>
                `).join('');
            }
        }

        async function approveRequest(uid) {
            if(!confirm("この申請を承認・確定しますか？")) return;
            const btn = document.getElementById(`btn-${uid}`);
            btn.disabled = true;
            showLoading(true, "処理中...");
            try {
                const json = await fetchGasPost('approve', { uid: uid, execUserName: currentUser.name, execRole: currentUser.role });
                if (json.status === 'success') { 
                    btn.innerText = "✅ 処理完了";
                    btn.classList.replace('bg-red-600', 'bg-green-500');
                    btn.classList.replace('bg-gray-500', 'bg-green-500');
                    setTimeout(() => fetchListData(), 1000);
                } else throw new Error(json.message);
            } catch (e) { alert("エラー: " + e.message); btn.disabled = false; }
            finally { showLoading(false); }
        }
    </script>
</body>
</html>
