<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>欠勤・休暇届申請</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <style>
    .container { max-width: 640px; margin-top: 24px; margin-bottom: 24px;}
    .user-info { background: #f5f5f5; padding: 10px; border-radius: 4px; margin-bottom: 20px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <section class="section">
    <div class="container">
      <h1 class="title is-4">欠勤・休暇届 申請フォーム</h1>
      
      <div id="userInfoDisplay" class="user-info">
        ユーザー情報を取得中...
      </div>

      <div id="manualNameField" class="field" style="display: none;">
         <label class="label">お名前 </label>
             <div class="control">
                <input class="input" type="text" id="manualName" placeholder="漢字で氏名を入力（例：三基太郎）">
            </div>
      </div>

      <p class="help is-danger has-text-weight-bold mb-4">
        ※緊急時は、先に電話での連絡をお願いします<br>
        ※上長の許可を得て申請してください
      </p>

      <form id="absenceForm" novalidate>
        <div class="field">
          <label class="label" for="type">種別</label>
          <div class="control">
            <div class="select is-fullwidth">
              <select id="type" name="type" required>
                <option value="">選択してください</option>
                <option value="遅刻">遅刻</option>
                <option value="早退">早退</option>
                <option value="欠勤">欠勤</option>
                <option value="外出">外出</option>
                <option value="取り消し">取り消し</option>
              </select>
            </div>
          </div>
        </div>

        <div class="field" id="categoryField">
          <label class="label" for="category">区分</label>
          <div class="control">
            <div class="select is-fullwidth">
              <select id="category" name="category">
                <option value="">選択してください</option>
                <option value="有給">有給</option>
                <option value="AM半休">AM半休</option>
                <option value="PM半休">PM半休</option>
                <option value="忌引">忌引</option>
                <option value="結婚">結婚</option>
                <option value="振替休日">振替休日</option>
                <option value="欠勤">欠勤</option>
              </select>
            </div>
          </div>
        </div>

        <div class="field" id="compDateField" style="display: none;">
          <label class="label" for="compDate">振替出勤日 <span class="has-text-danger is-size-7">※必須</span></label>
          <div class="control">
            <input class="input" type="date" id="compDate" name="compDate">
          </div>
        </div>

        <div class="field">
          <label class="label">対象日</label>
          <div class="control mb-2">
            <label class="checkbox">
              <input type="checkbox" id="isPeriod">
              <strong>期間で申請</strong>
            </label>
          </div>
          <div class="field is-grouped">
            <div class="control is-expanded">
              <input class="input" type="date" id="startDate" name="startDate" required>
            </div>
            <div class="control" id="dateSeparator" style="display: none; align-self: center;">
              <span>〜</span>
            </div>
            <div class="control is-expanded" id="endDateArea" style="display: none;">
              <input class="input" type="date" id="endDate" name="endDate">
            </div>
          </div>
        </div>

        <div class="field" id="timeField">
          <label class="label">時間</label>
          <div class="control mb-2">
            <label class="checkbox">
              <input type="checkbox" id="allDay" name="allDay">
              <strong>終日 (8:30〜17:30を自動入力)</strong>
            </label>
          </div>
          <div class="field is-grouped">
            <div class="control is-expanded">
              <input class="input" type="time" id="startTime" name="startTime">
            </div>
            <div class="control" style="align-self: center;"><span>〜</span></div>
            <div class="control is-expanded">
              <input class="input" type="time" id="endTime" name="endTime">
            </div>
          </div>
        </div>

        <div class="field" id="reasonField">
          <label class="label" for="reason">理由</label>
          <div class="control">
            <textarea class="textarea" id="reason" name="reason" rows="3"></textarea>
          </div>
        </div>

        <div class="field" id="targetNameField" style="display: none; background-color: #fff5f5; padding: 15px; border: 1px solid #f14668; border-radius: 4px; margin-bottom: 20px;">
          <label class="label has-text-danger" for="targetName">取り消し対象者名 <span class="has-text-danger is-size-7">※必須</span></label>
          <div class="control">
            <input class="input is-danger" type="text" id="targetName" placeholder="取り消したい対象者の名前を入力（例：三基太郎）">
          </div>
          <p class="help has-text-danger">※総務担当者用：誰の申請を取り消すかを入力してください。</p>
        </div>
        
        <div id="cancelCandidatesArea" class="box" style="display: none; background-color: #fff5f5; border: 1px solid #f14668;">
          <h3 class="title is-6 has-text-danger">取り消す申請を選択してください</h3>
          <div id="candidatesList" class="control mb-4">
            </div>
          <button type="button" class="button is-danger is-fullwidth" id="executeCancelBtn">
            選択した申請を取り消す
          </button>
        </div>

        <div class="field mt-5">
          <div class="control">
            <button class="button is-link is-fullwidth" type="submit" id="submitBtn">申請する</button>
          </div>
        </div>
      </form>
    </div>
  </section>

  <script charset="utf-8" src="https://static.worksmobile.net/static/wm/woff/edge/3.7.1/sdk.js"></script>

  <script>
    let woffReady = false;
    let userProfile = { userId: "", displayName: "" };

    window.addEventListener('load', () => {
      if (typeof woff !== 'undefined' && woff.init) {
        woff.init({ woffId: "W_kh178qQ_uGfLxefRwo4w" })
          .then(() => {
            woffReady = true;
            return woff.getProfile();
          })
          .then(profile => {
            userProfile = profile;
            document.getElementById('userInfoDisplay').innerText = `申請者: ${profile.displayName} `;
          })
          .catch(err => {
            console.error("WOFF Error:", err);
            document.getElementById('userInfoDisplay').innerText = "読取失敗";
            const manualField = document.getElementById('manualNameField');
            if (manualField) {
              manualField.style.display = 'block';
            }
        });
      }
    });

    // ==========================================
    // UI表示切り替え ＆ 時刻自動入力（種別変更）
    // ==========================================
    document.getElementById('type').addEventListener('change', function() {
      const selectedType = this.value;
      const isCancel = (selectedType === '取り消し');
      
      const displayStyle = isCancel ? 'none' : 'block';
      document.getElementById('categoryField').style.display = displayStyle;
      document.getElementById('timeField').style.display = displayStyle;
      document.getElementById('reasonField').style.display = displayStyle;
      document.getElementById('compDateField').style.display = 'none';

      const submitBtn = document.getElementById('submitBtn');
      const cancelArea = document.getElementById('cancelCandidatesArea');
      const targetNameField = document.getElementById('targetNameField'); // ★追加：対象者名フィールド
      
      const startTimeInput = document.getElementById('startTime');
      const endTimeInput = document.getElementById('endTime');

      if (isCancel) {
        submitBtn.innerText = "取り消し候補を検索";
        submitBtn.classList.replace('is-link', 'is-warning');
        cancelArea.style.display = 'none';
        targetNameField.style.display = 'block'; // ★取り消し時は対象者名入力を表示
      } else {
        submitBtn.innerText = "申請する";
        submitBtn.classList.replace('is-warning', 'is-link');
        cancelArea.style.display = 'none';
        targetNameField.style.display = 'none'; // ★通常時は非表示
        
        // 遅刻・早退の自動入力
        if (selectedType === '遅刻') {
          startTimeInput.value = "08:30";
        } else if (selectedType === '早退') {
          endTimeInput.value = "17:30";
        }

        if (document.getElementById('category').value === '振替休日') {
          document.getElementById('compDateField').style.display = 'block';
        }
      }
    });

    // ==========================================
    // 区分変更時の挙動
    // ==========================================
    document.getElementById('category').addEventListener('change', function() {
      document.getElementById('compDateField').style.display = (this.value === '振替休日') ? 'block' : 'none';
    });

    // ==========================================
    // その他UI挙動
    // ==========================================
    document.getElementById('isPeriod').addEventListener('change', function() {
      const isChecked = this.checked;
      document.getElementById('dateSeparator').style.display = isChecked ? 'block' : 'none';
      document.getElementById('endDateArea').style.display = isChecked ? 'block' : 'none';
      if (!isChecked) {
        document.getElementById('endDate').value = "";
      }
    });

    document.getElementById('allDay').addEventListener('change', function() {
      const startTimeInput = document.getElementById('startTime');
      const endTimeInput = document.getElementById('endTime');
      if (this.checked) {
        startTimeInput.value = "08:30";
        endTimeInput.value = "17:30";
      } else {
        startTimeInput.value = "";
        endTimeInput.value = "";
      }
    });

    // ==========================================
    // 送信（検索 or 新規）
    // ==========================================
    document.getElementById('absenceForm').addEventListener('submit', function (ev) {
      ev.preventDefault();
      const typeValue = document.getElementById('type').value;
      if (typeValue === '取り消し') {
        searchCandidates();
      } else {
        submitForm();
      }
    });

    function validate(data) {
      if (!data.type) {
        alert("種別を選択してください。"); return false;
      } 
      if (data.type !== '取り消し' && !data.category) {
        alert("区分を選択してください。"); return false;
      }
      if (!data.startDate) {
        alert("対象日を入力してください。"); return false;
      }
      if (data.isPeriod) {
        if (!data.endDate) { alert("対象日の終了日を入力してください。"); return false; }
        if (data.startDate > data.endDate) { alert("終了日は開始日以降を指定してください。"); return false; }
      }
      if (data.type !== '取り消し' && data.category === '振替休日' && !data.compDate) {
        alert("振替出勤日を入力してください。"); return false;
      }
      return true;
    }

    // ==========================================
    // 新規申請処理
    // ==========================================
    function submitForm() {
      const finalUserName = userProfile.displayName || document.getElementById('manualName').value;
      if (!finalUserName) {
         alert("お名前を入力してください。"); return;
      }

      const isPeriodChecked = document.getElementById('isPeriod').checked;
      const startDateValue = document.getElementById('startDate').value;
      const endDateValue = isPeriodChecked ? document.getElementById('endDate').value : startDateValue;

      const data = {
        action: "apply",
        userId: userProfile.userId,
        userName: finalUserName,
        type: document.getElementById('type').value,
        category: document.getElementById('category').value,
        compDate: document.getElementById('compDate').value,
        isPeriod: isPeriodChecked,
        startDate: startDateValue,
        endDate: endDateValue,
        allDay: document.getElementById('allDay').checked,
        startTime: document.getElementById('startTime').value,
        endTime: document.getElementById('endTime').value,
        reason: document.getElementById('reason').value
      };

      if (!validate(data)) return;

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerText = "送信中...";

      sendToGAS(data).then(() => {
        alert("申請が完了しました。");
        if (woffReady && woff.closeWindow) woff.closeWindow();
      });
    }

   
    // ==========================================
    // 取り消し確定処理
    // ==========================================
    document.getElementById('executeCancelBtn').addEventListener('click', function() {
      const selected = document.querySelector('input[name="cancelTarget"]:checked');
      if (!selected) { alert("取り消す申請を選択してください。"); return; }
      if (!confirm("選択した申請を取り消します。よろしいですか？")) return;

      const btn = document.getElementById('executeCancelBtn');
      btn.disabled = true;
      btn.innerText = "取り消し処理中...";

      sendToGAS({ action: "cancel", targetRowNumber: selected.value }).then(() => {
        alert("取り消し処理が完了しました。");
        if (woffReady && woff.closeWindow) woff.closeWindow();
      });
    });
    
    // ==========================================
    // 検索処理
    // ==========================================
    function searchCandidates() {
      // ★自身の名前ではなく、対象者名入力欄から名前を取得する
      const targetUserName = document.getElementById('targetName').value.trim();
      const startDateValue = document.getElementById('startDate').value;

      if (!targetUserName || !startDateValue) {
        alert("対象者名と対象日を入力して検索してください。");
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerText = "検索中...";

      // ★ userNameとしてtargetUserNameを送信
      const payload = { action: "search", userName: targetUserName, startDate: startDateValue };

      sendToGAS(payload).then(result => {
        btn.disabled = false;
        btn.innerText = "取り消し候補を再検索";
        
        const candidatesList = document.getElementById('candidatesList');
        candidatesList.innerHTML = ''; 

        if (result.candidates && result.candidates.length > 0) {
          result.candidates.forEach((cand) => {
            const label = document.createElement('label');
            label.className = "radio is-block mb-2";
            label.innerHTML = `<input type="radio" name="cancelTarget" value="${cand.rowNumber}"> 【${cand.type}】 ${cand.category} (対象日: ${payload.startDate})`;
            candidatesList.appendChild(label);
          });
          document.getElementById('cancelCandidatesArea').style.display = 'block';
        } else {
          alert("該当する申請履歴が見つかりません。対象日を確認してください。");
          document.getElementById('cancelCandidatesArea').style.display = 'none';
        }
      });
    }
    
    // ==========================================
    // GAS通信処理
    // ==========================================
    function sendToGAS(payload) {
      const gasUrl = "https://script.google.com/macros/s/AKfycbz2_fHa_RIfgUo2tsl38mJtTs-x93N8AUUvaYlb4qlK1HQa8xY9yKb_RNZ2r2zlVyeq/exec";
      return fetch(gasUrl, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify(payload)
      }).then(response => {
        if (!response.ok) throw new Error("ネットワークエラー");
        return response.json();
      }).catch(err => {
        console.error(err);
        alert("サーバー通信中にエラーが発生しました。");
        const btn = document.getElementById('submitBtn');
        btn.disabled = false;
        btn.innerText = document.getElementById('type').value === '取り消し' ? "取り消し候補を検索" : "申請する";
        throw err; 
      });
    }
  </script>
</body>
</html>
