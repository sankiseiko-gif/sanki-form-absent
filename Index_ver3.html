<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>休暇申請ツール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.worksmobile.net/static/wm/woff/edge/3.6.0/sdk.js"></script>
    <style>
        body { font-family: sans-serif; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <nav class="bg-white shadow-sm mb-4">
        <div class="flex justify-around">
            <button id="tabBtn-apply" class="flex-1 py-3 text-sm font-bold text-blue-600 border-b-2 border-blue-600 transition" onclick="switchTab('apply')">新規申請</button>
            <button id="tabBtn-history" class="flex-1 py-3 text-sm font-bold text-gray-400 border-b-2 border-transparent transition" onclick="switchTab('history')">申請履歴・取消</button>
        </div>
    </nav>

    <div id="loading" class="fixed inset-0 bg-white bg-opacity-80 flex justify-center items-center z-50 hidden">
        <div class="flex flex-col items-center"><div class="loader mb-2"></div><p id="loadingText" class="text-sm text-gray-600 font-bold">通信中...</p></div>
    </div>

    <main class="px-4 pb-8 max-w-lg mx-auto">
        <!-- 申請タブ -->
        <section id="tab-apply">
            <div class="bg-white p-5 rounded-lg shadow-sm border border-gray-100">
                
                <div class="bg-green-50 border-l-4 border-green-500 p-3 rounded mb-5">
                    <p class="text-xs text-green-700 font-bold mb-1">申請者情報</p>
                    <div class="flex items-center gap-2">
                        <input type="text" id="userName" class="w-full bg-transparent font-bold text-gray-800 outline-none" placeholder="情報を取得中..." readonly>
                        <button id="authByNameBtn" onclick="authenticateByName()" class="hidden bg-green-600 hover:bg-green-700 text-white text-xs font-bold px-4 py-2 rounded shadow whitespace-nowrap">連携</button>
                    </div>
                    <p id="fallbackMessage" class="text-xs text-red-500 mt-2 hidden">※PC環境等のため自動連携に失敗しました。氏名を漢字で入力して「連携」を押してください。</p>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-bold mb-1 text-gray-700">種別</label>
                    <select id="typeSelect" class="w-full border border-gray-300 rounded-md p-2.5 bg-gray-50 focus:ring-2 focus:ring-blue-200 outline-none" onchange="handleTypeChange()">
                        <option value="">選択してください</option>
                        <option value="遅刻">遅刻</option>
                        <option value="早退">早退</option>
                        <option value="欠勤">欠勤</option>
                        <option value="外出">外出</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-bold mb-1 text-gray-700">区分</label>
                    <select id="categorySelect" class="w-full border border-gray-300 rounded-md p-2.5 bg-gray-50 focus:ring-2 focus:ring-blue-200 outline-none" onchange="handleCategoryChange()">
                        <option value="">選択してください</option>
                        <option value="有給">有給</option>
                        <option value="AM半休">AM半休</option>
                        <option value="PM半休">PM半休</option>
                        <option value="忌引">忌引</option>
                        <option value="結婚">結婚</option>
                        <option value="振替休日">振替休日</option>
                        <option value="欠勤">欠勤</option>
                        <option value="外出">外出</option>
                    </select>
                </div>

                <div id="compDateWrapper" class="mb-4 hidden border-l-4 border-blue-400 pl-3 bg-blue-50 p-2 rounded-r">
                    <label class="block text-sm font-bold mb-1 text-blue-700">振替対象日</label>
                    <input type="date" id="compDate" class="w-full border border-blue-200 rounded p-2 bg-white outline-none">
                </div>

                <div class="mb-5 border border-gray-200 p-4 rounded-md bg-gray-50">
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-sm font-bold text-gray-700">対象日</label>
                        <label class="flex items-center text-sm cursor-pointer text-blue-600 font-bold">
                            <input type="checkbox" id="periodCheck" class="mr-1 accent-blue-600" onchange="handlePeriodChange()"> 期間で入力
                        </label>
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="date" id="startDate" class="flex-1 border border-gray-300 rounded p-2 focus:ring-2 focus:ring-blue-200 outline-none">
                        <span id="periodToLabel" class="hidden text-gray-500 font-bold">～</span>
                        <input type="date" id="endDate" class="flex-1 border border-gray-300 rounded p-2 hidden focus:ring-2 focus:ring-blue-200 outline-none">
                    </div>
                </div>

                <div class="mb-5">
                    <label class="block text-sm font-bold mb-1 text-gray-700">時間</label>
                    <div class="flex items-center gap-2">
                        <input type="time" id="startTime" class="flex-1 border border-gray-300 rounded p-2 bg-white focus:ring-2 focus:ring-blue-200 outline-none">
                        <span class="text-gray-500 font-bold">～</span>
                        <input type="time" id="endTime" class="flex-1 border border-gray-300 rounded p-2 bg-white focus:ring-2 focus:ring-blue-200 outline-none">
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-bold mb-1 text-gray-700">理由</label>
                    <textarea id="reason" rows="3" class="w-full border border-gray-300 rounded-md p-2 bg-white focus:ring-2 focus:ring-blue-200 outline-none" placeholder="自由記入"></textarea>
                </div>

                <button id="submitBtn" onclick="submitApplication()" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-lg shadow-md hover:bg-blue-700 transition disabled:bg-gray-400">
                    申請を送信する
                </button>
            </div>
        </section>

        <!-- 履歴タブ -->
        <section id="tab-history" class="hidden">
            <h3 class="font-bold text-gray-700 mb-3 ml-1">あなたの直近の申請履歴</h3>
            <div id="historyList" class="space-y-3"></div>
        </section>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxwEuHjXVsUjbhH9Bo5yQ3vgln5LM615sKftO5pQgzjpPzpRvXuxMcqmyNTNhEhaQeZ/exec"; 
        const WOFF_ID = "RAj4F7BMV-oVhCo-nRSaXw";        
        
        let currentUser = { id: "", name: "", role: "一般" };
        let isFallbackMode = false;

        window.onload = () => {
            const timeoutId = setTimeout(() => {
                if(!currentUser.id && !isFallbackMode) activateFallbackMode();
            }, 5000);

            woff.init({ woffId: WOFF_ID }).then(() => {
                if (!woff.isLoggedIn()) { woff.login(); return; }
                woff.getProfile().then(profile => {
                    clearTimeout(timeoutId);
                    currentUser.id = profile.userId;
                    initApp();
                }).catch(err => { clearTimeout(timeoutId); activateFallbackMode(); });
            }).catch(err => { clearTimeout(timeoutId); activateFallbackMode(); });
        };

        function activateFallbackMode() {
            isFallbackMode = true;
            const un = document.getElementById('userName');
            un.placeholder = "氏名を漢字で入力 (例: 山田 太郎)";
            un.removeAttribute('readonly');
            un.classList.remove('bg-transparent', 'font-bold');
            un.classList.add('border', 'border-gray-300', 'bg-white', 'p-2', 'rounded-md', 'focus:ring-2', 'focus:ring-blue-200', 'text-sm');
            document.getElementById('authByNameBtn').classList.remove('hidden');
            document.getElementById('fallbackMessage').classList.remove('hidden');
        }

        async function initApp() {
            if (isFallbackMode) return;
            showLoading(true, "ユーザー情報を取得中...");
            try {
                const json = await fetchGasPost('getUser', { userId: currentUser.id });
                if (json.status === 'success' && json.data.userName) {
                    currentUser.name = json.data.userName;
                    currentUser.role = json.data.role;
                    document.getElementById('userName').value = currentUser.name;
                } else throw new Error("ユーザーがマスタに存在しません");
            } catch (e) {
                activateFallbackMode();
            } finally {
                showLoading(false);
            }
        }

        async function authenticateByName() {
            const nameInput = document.getElementById('userName').value.trim();
            if (!nameInput) return alert("氏名を入力してください。");

            showLoading(true, "マスタと連携中...");
            try {
                const json = await fetchGasPost('getUserByName', { userName: nameInput });
                if (json.status === 'success' && json.data) {
                    currentUser.id = json.data.userId;
                    currentUser.name = json.data.userName;
                    currentUser.role = json.data.role;
                    
                    const un = document.getElementById('userName');
                    un.setAttribute('readonly', 'true');
                    un.classList.remove('border', 'border-gray-300', 'bg-white', 'focus:ring-2', 'focus:ring-blue-200');
                    un.classList.add('bg-transparent', 'font-bold');
                    document.getElementById('authByNameBtn').classList.add('hidden');
                    document.getElementById('fallbackMessage').classList.add('hidden');
                    alert(`「${currentUser.name}」さんとして連携が完了しました。`);
                    
                    if (!document.getElementById('tab-history').classList.contains('hidden')) fetchListData();
                } else alert("マスタに該当する名前が見つかりません。");
            } catch (e) { alert("通信エラー: " + e.message); }
            finally { showLoading(false); }
        }

        function switchTab(tabId) {
            ['apply', 'history'].forEach(id => {
                const section = document.getElementById('tab-' + id);
                const btn = document.getElementById('tabBtn-' + id);
                if (id === tabId) {
                    section.classList.remove('hidden');
                    btn.classList.add('text-blue-600', 'border-blue-600'); btn.classList.remove('text-gray-400', 'border-transparent');
                } else {
                    section.classList.add('hidden');
                    btn.classList.remove('text-blue-600', 'border-blue-600'); btn.classList.add('text-gray-400', 'border-transparent');
                }
            });
            if (tabId === 'history') {
                if (isFallbackMode && !currentUser.id) {
                    alert("履歴を取得するには氏名を入力して「連携」を完了させてください。");
                    switchTab('apply');
                } else { fetchListData(); }
            }
        }

        function showLoading(show, text = "通信中...") {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }

        function handleTypeChange() {
            const type = document.getElementById('typeSelect').value;
            const categorySelect = document.getElementById('categorySelect');
            const startTime = document.getElementById('startTime');
            const endTime = document.getElementById('endTime');
            startTime.value = ''; endTime.value = '';

            if (type === '遅刻') startTime.value = '08:30';
            else if (type === '早退') endTime.value = '17:30';
            else if (type === '欠勤') { startTime.value = '08:30'; endTime.value = '17:30'; categorySelect.value = '欠勤'; }
            else if (type === '外出') { startTime.value = '08:30'; endTime.value = '17:30'; categorySelect.value = '外出'; }
            handleCategoryChange();
        }

        function handleCategoryChange() {
            const category = document.getElementById('categorySelect').value;
            const wrapper = document.getElementById('compDateWrapper');
            if (category === '振替休日') wrapper.classList.remove('hidden');
            else { wrapper.classList.add('hidden'); document.getElementById('compDate').value = ''; }
        }

        function handlePeriodChange() {
            const isPeriod = document.getElementById('periodCheck').checked;
            const endWrapper = document.getElementById('endDate');
            const label = document.getElementById('periodToLabel');
            if (isPeriod) { endWrapper.classList.remove('hidden'); label.classList.remove('hidden'); }
            else { endWrapper.classList.add('hidden'); label.classList.add('hidden'); endWrapper.value = ''; }
        }

        async function fetchGasPost(action, payload) {
            const res = await fetch(GAS_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ action: action, payload: payload })
            });
            return res.json();
        }

        async function submitApplication() {
            if (isFallbackMode && !currentUser.id) return alert("氏名を入力し、「連携」を完了させてください。");
            
            const btn = document.getElementById('submitBtn');
            const uId = currentUser.id;
            const name = currentUser.name;
            const type = document.getElementById('typeSelect').value;
            const category = document.getElementById('categorySelect').value;
            const compDate = document.getElementById('compDate').value;
            const isPeriod = document.getElementById('periodCheck').checked;
            const startDate = document.getElementById('startDate').value;
            const endDate = isPeriod ? document.getElementById('endDate').value : startDate;
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;

            if (!type || !category) return alert("種別と区分を選択してください。");
            if (!startDate) return alert("対象日(開始日)を選択してください。");
            if (isPeriod && !endDate) return alert("期間終了日を選択してください。");
            if (isPeriod && new Date(startDate) > new Date(endDate)) return alert("終了日は開始日以降にしてください。");
            if (!startTime || !endTime) return alert("開始時間と終了時間を指定してください。");
            if (category === '振替休日' && !compDate) return alert("振替対象日を入力してください。");

            const data = {
                userId: uId, userName: name, type: type, category: category,
                compDate: compDate, startDate: startDate, endDate: endDate,
                startTime: startTime, endTime: endTime, reason: document.getElementById('reason').value
            };

            btn.disabled = true;
            showLoading(true, "送信中...");
            try {
                const json = await fetchGasPost('submit', data);
                if (json.status === 'success') { 
                    alert("申請が完了しました。"); 
                    if(woff.isLoggedIn()) woff.closeWindow(); else location.reload();
                } else throw new Error(json.message);
            } catch (e) {
                alert("送信失敗: " + e.message);
                btn.disabled = false;
            } finally { showLoading(false); }
        }

        async function fetchListData() {
            showLoading(true, "履歴を取得中...");
            try {
                const json = await fetchGasPost('getList', { userId: currentUser.id, role: currentUser.role });
                if (json.status === 'success') {
                    const myHistory = json.data.filter(item => item.applicantId === currentUser.id);
                    renderHistory(myHistory);
                }
            } catch (e) { alert("履歴の取得に失敗しました。"); } 
            finally { showLoading(false); }
        }

        function renderHistory(list) {
            const container = document.getElementById('historyList');
            if (list.length === 0) return container.innerHTML = '<div class="bg-white p-4 rounded text-center text-sm text-gray-500 shadow-sm border">履歴はありません</div>';
            
            container.innerHTML = list.map(item => `
                <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100 border-l-4 ${item.status.includes('承認済み') ? 'border-green-500' : 'border-yellow-400'}">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold text-gray-800">${item.category}</span>
                        <span class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded-full font-bold border">${item.status}</span>
                    </div>
                    <p class="text-sm text-gray-600 mb-3">対象日: ${item.startDate}</p>
                    ${(item.status === '承認済み' || item.status === '仮申請' || item.status === '上長承認') ? 
                        `<button class="w-full text-red-500 bg-red-50 border border-red-200 hover:bg-red-100 font-bold rounded-md py-2 transition text-sm" onclick="cancelRequest('${item.uid}')">取消申請を行う</button>` : ''}
                </div>
            `).join('');
        }

        async function cancelRequest(uid) {
            if(!confirm("この申請を取り消しますか？")) return;
            showLoading(true, "処理中...");
            try {
                const json = await fetchGasPost('cancel', { uid: uid });
                if (json.status === 'success') { alert("取消を申請しました"); fetchListData(); }
                else throw new Error(json.message);
            } catch (e) { alert("エラー: " + e.message); }
            finally { showLoading(false); }
        }
    </script>
</body>
</html>

        <section id="tab-approve" class="hidden">
            <div class="flex justify-between items-center mb-3 bg-white p-3 rounded shadow-sm border border-gray-100">
                <h3 class="font-bold text-gray-700">承認待ち一覧</h3>
                <span id="roleBadge" class="text-xs bg-red-100 text-red-700 px-2 py-1 rounded-full font-bold border border-red-200"></span>
            </div>
            <div id="approveList" class="space-y-3"></div>
        </section>
    </main>

    <script>
        

        
        let currentUser = { id: "", name: "", role: "一般" };
        let isFallbackMode = false;

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const targetTab = urlParams.get('tab') || 'apply';
            const roleParam = urlParams.get('role');

            const timeoutId = setTimeout(() => {
                if(!currentUser.id && !isFallbackMode) {
                    console.warn("WOFF Init Timeout.");
                    activateFallbackMode(targetTab, roleParam);
                }
            }, 5000);

            woff.init({ woffId: WOFF_ID }).then(() => {
                if (!woff.isLoggedIn()) { woff.login(); return; }
                woff.getProfile().then(profile => {
                    clearTimeout(timeoutId);
                    currentUser.id = profile.userId;
                    initApp(targetTab, roleParam);
                }).catch(err => {
                    clearTimeout(timeoutId);
                    console.warn("WOFF Profile Error:", err);
                    activateFallbackMode(targetTab, roleParam);
                });
            }).catch(err => {
                clearTimeout(timeoutId);
                console.warn("WOFF Init Error:", err);
                activateFallbackMode(targetTab, roleParam);
            });
        };

        // 【機能追加】名前連携へのUI切り替え
        function activateFallbackMode(targetTab, roleParam) {
            isFallbackMode = true;
            
            const un = document.getElementById('userName');
            un.placeholder = "氏名を漢字で入力 (例: 三基太郎)";
            un.removeAttribute('readonly');
            un.classList.remove('bg-transparent', 'font-bold');
            un.classList.add('border', 'border-gray-300', 'bg-white', 'p-2', 'rounded-md', 'focus:ring-2', 'focus:ring-blue-200', 'text-sm');
            
            document.getElementById('authByNameBtn').classList.remove('hidden');
            document.getElementById('fallbackMessage').classList.remove('hidden');
            
            if (targetTab === 'approve') {
                alert("承認権限を確認するため、まずは氏名を入力して「連携」を行ってください。");
                switchTab('apply');
            } else {
                switchTab(targetTab);
            }
        }

        async function initApp(targetTab, roleParam) {
            if (isFallbackMode) {
                switchTab(targetTab);
                return;
            }

            showLoading(true, "ユーザー情報を取得中...");
            try {
                const json = await fetchGasPost('getUser', { userId: currentUser.id });
                
                if (json.status === 'success' && json.data.userName) {
                    currentUser.name = json.data.userName;
                    currentUser.role = json.data.role;
                    document.getElementById('userName').value = currentUser.name;
                } else {
                    throw new Error("ユーザーがマスタに存在しません");
                }

                if (targetTab === 'approve') {
                    if (roleParam === 'soumu' && currentUser.role === '総務') setupApproveMode('総務');
                    else if (roleParam === 'manager' && (currentUser.role === '上長' || currentUser.role === '総務')) setupApproveMode('上長');
                    else {
                        alert("権限がありません。");
                        if(woff.isLoggedIn()) woff.closeWindow();
                    }
                } else {
                    switchTab(targetTab);
                }
            } catch (e) {
                console.error(e);
                alert("情報の取得に失敗しました。名前での手動連携モードに切り替えます。");
                activateFallbackMode(targetTab, roleParam);
            } finally {
                showLoading(false);
            }
        }

        // 【機能追加】名前をGASに送って内部IDと権限を取得する
        async function authenticateByName() {
            const nameInput = document.getElementById('userName').value.trim();
            if (!nameInput) return alert("氏名を入力してください。");

            showLoading(true, "マスタと連携中...");
            try {
                const json = await fetchGasPost('getUserByName', { userName: nameInput });
                
                if (json.status === 'success' && json.data) {
                    currentUser.id = json.data.userId;
                    currentUser.name = json.data.userName;
                    currentUser.role = json.data.role;
                    
                    // UIを確定状態(readonly)に戻す
                    const un = document.getElementById('userName');
                    un.setAttribute('readonly', 'true');
                    un.classList.remove('border', 'border-gray-300', 'bg-white', 'focus:ring-2', 'focus:ring-blue-200');
                    un.classList.add('bg-transparent', 'font-bold');
                    
                    document.getElementById('authByNameBtn').classList.add('hidden');
                    document.getElementById('fallbackMessage').classList.add('hidden');

                    alert(`「${currentUser.name}」さんとして連携が完了しました。`);

                    // 初期起動時のURLパラメータを再評価して適切なタブへ
                    const urlParams = new URLSearchParams(window.location.search);
                    const targetTab = urlParams.get('tab') || 'apply';
                    const roleParam = urlParams.get('role');
                    
                    if (targetTab === 'approve') {
                         if (roleParam === 'soumu' && currentUser.role === '総務') setupApproveMode('総務');
                         else if (roleParam === 'manager' && (currentUser.role === '上長' || currentUser.role === '総務')) setupApproveMode('上長');
                         else { alert("承認管理を開く権限がありません。"); switchTab('apply'); }
                    } else if (targetTab === 'history') {
                         switchTab('history');
                    }
                } else {
                    alert("マスタに該当する名前が見つかりません。入力に誤りがないか確認してください。");
                }
            } catch (e) {
                alert("通信エラーが発生しました: " + e.message);
            } finally {
                showLoading(false);
            }
        }

        function setupApproveMode(displayRole) {
            document.getElementById('mainNav').classList.add('hidden');
            document.getElementById('tabBtn-approve').classList.remove('hidden');
            document.getElementById('roleBadge').textContent = displayRole + "モード";
            switchTab('approve');
        }

        function switchTab(tabId) {
            ['apply', 'history', 'approve'].forEach(id => {
                const section = document.getElementById('tab-' + id);
                const btn = document.getElementById('tabBtn-' + id);
                if (id === tabId) {
                    section.classList.remove('hidden');
                    if(btn) { btn.classList.add('text-blue-600', 'border-blue-600'); btn.classList.remove('text-gray-400', 'border-transparent'); }
                } else {
                    section.classList.add('hidden');
                    if(btn) { btn.classList.remove('text-blue-600', 'border-blue-600'); btn.classList.add('text-gray-400', 'border-transparent'); }
                }
            });
            
            if (tabId === 'history' || tabId === 'approve') {
                if (isFallbackMode && !currentUser.id) {
                    alert("まずは申請タブで氏名を入力し「連携」ボタンを押してください。");
                    switchTab('apply');
                } else {
                    fetchListData();
                }
            }
        }

        function showLoading(show, text = "通信中...") {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }

        function handleTypeChange() {
            const type = document.getElementById('typeSelect').value;
            const categorySelect = document.getElementById('categorySelect');
            const startTime = document.getElementById('startTime');
            const endTime = document.getElementById('endTime');
            startTime.value = ''; endTime.value = '';

            if (type === '遅刻') startTime.value = '08:30';
            else if (type === '早退') endTime.value = '17:30';
            else if (type === '欠勤') { startTime.value = '08:30'; endTime.value = '17:30'; categorySelect.value = '欠勤'; }
            else if (type === '外出') { startTime.value = '08:30'; endTime.value = '17:30'; categorySelect.value = '外出'; }
            handleCategoryChange();
        }

        function handleCategoryChange() {
            const category = document.getElementById('categorySelect').value;
            const wrapper = document.getElementById('compDateWrapper');
            if (category === '振替休日') wrapper.classList.remove('hidden');
            else { wrapper.classList.add('hidden'); document.getElementById('compDate').value = ''; }
        }

        function handlePeriodChange() {
            const isPeriod = document.getElementById('periodCheck').checked;
            const endWrapper = document.getElementById('endDate');
            const label = document.getElementById('periodToLabel');
            if (isPeriod) { endWrapper.classList.remove('hidden'); label.classList.remove('hidden'); }
            else { endWrapper.classList.add('hidden'); label.classList.add('hidden'); endWrapper.value = ''; }
        }

        async function fetchGasPost(action, payload) {
            const res = await fetch(GAS_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ action: action, payload: payload })
            });
            return res.json();
        }

        async function submitApplication() {
            // 送信前に連携完了チェック
            if (isFallbackMode && !currentUser.id) return alert("まずは氏名を入力し、「連携」ボタンを押してください。");
            
            const btn = document.getElementById('submitBtn');
            const uId = currentUser.id;
            const name = currentUser.name;
            const type = document.getElementById('typeSelect').value;
            const category = document.getElementById('categorySelect').value;
            const compDate = document.getElementById('compDate').value;
            const isPeriod = document.getElementById('periodCheck').checked;
            const startDate = document.getElementById('startDate').value;
            const endDate = isPeriod ? document.getElementById('endDate').value : startDate;
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;

            if (!uId || !name) return alert("ユーザー情報が取得できていません。");
            if (!type || !category) return alert("種別と区分を選択してください。");
            if (!startDate) return alert("対象日(開始日)を選択してください。");
            if (isPeriod && !endDate) return alert("期間終了日を選択してください。");
            if (isPeriod && new Date(startDate) > new Date(endDate)) return alert("終了日は開始日より後の日付にしてください。");
            if (!startTime || !endTime) return alert("開始時間と終了時間を指定してください。");
            if (category === '振替休日' && !compDate) return alert("振替対象日を入力してください。");

            const data = {
                userId: uId, userName: name, type: type, category: category,
                compDate: compDate, startDate: startDate, endDate: endDate,
                startTime: startTime, endTime: endTime, reason: document.getElementById('reason').value
            };

            btn.disabled = true;
            showLoading(true, "送信中...");
            try {
                const json = await fetchGasPost('submit', data);
                if (json.status === 'success') { 
                    alert("申請が完了しました。"); 
                    if(woff.isLoggedIn()) { woff.closeWindow(); } else { location.reload(); }
                } else {
                    throw new Error(json.message);
                }
            } catch (e) {
                alert("送信に失敗しました。\n" + e.message);
                btn.disabled = false;
            } finally {
                showLoading(false);
            }
        }

        async function fetchListData() {
            const uId = currentUser.id;
            if (!uId) return;

            showLoading(true, "リストを取得中...");
            try {
                const json = await fetchGasPost('getList', { userId: uId, role: currentUser.role });
                if (json.status === 'success') {
                    renderHistory(json.data.filter(item => item.applicantId === uId));
                    renderApproveList(json.data.filter(item => item.applicantId !== uId || (currentUser.role === '総務' && item.status.includes('待ち'))));
                }
            } catch (e) {
                console.error("Fetch List Error:", e);
                alert("リストの取得に失敗しました。");
            } finally {
                showLoading(false);
            }
        }

        function renderHistory(list) {
            const container = document.getElementById('historyList');
            if (list.length === 0) return container.innerHTML = '<div class="bg-white p-4 rounded text-center text-sm text-gray-500 shadow-sm border border-gray-100">履歴はありません</div>';
            
            container.innerHTML = list.map(item => `
                <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100 border-l-4 ${item.status.includes('承認済み') ? 'border-green-500' : 'border-yellow-400'}">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold text-gray-800">${item.category}</span>
                        <span class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded-full font-bold border border-gray-200">${item.status}</span>
                    </div>
                    <p class="text-sm text-gray-600 mb-3">対象日: ${item.startDate}</p>
                    ${(item.status === '承認済み' || item.status === '仮申請' || item.status === '上長承認') ? 
                        `<button class="w-full text-red-500 bg-red-50 border border-red-200 hover:bg-red-100 font-bold rounded-md py-2 transition text-sm" onclick="cancelRequest('${item.uid}')">取消申請を行う</button>` : ''}
                </div>
            `).join('');
        }

        function renderApproveList(list) {
            const container = document.getElementById('approveList');
            const displayRole = document.getElementById('roleBadge').textContent.replace('モード', '');
            
            const filtered = list.filter(item => {
                if (displayRole === '上長' && item.status === '仮申請' && item.managerId === currentUser.id) return true;
                if (displayRole === '総務' && (item.status === '上長承認' || item.status === '仮取り消し' || item.status === '仮申請')) return true;
                return false;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="bg-green-50 border border-green-200 p-6 rounded-lg text-center fade-in">
                    <p class="text-green-700 font-bold text-lg mb-1">🎉 すべての承認が完了しました！</p>
                    <p class="text-green-600 text-xs">画面を閉じます...</p>
                </div>`;
                setTimeout(() => { if(woff.isLoggedIn()) { woff.closeWindow(); } else { location.reload(); } }, 2000);
                return;
            }

            container.innerHTML = filtered.map(item => `
                <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100 border-l-4 border-blue-500" id="card-${item.uid}">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold text-gray-800">${item.userName}</span>
                        <span class="text-xs font-bold text-red-600 bg-red-50 px-2 py-1 rounded-full border border-red-100">${item.status}</span>
                    </div>
                    <p class="text-sm text-gray-600 mb-1">区分: ${item.category}</p>
                    <p class="text-sm text-gray-600 mb-3">対象: ${item.startDate}</p>
                    <button id="btn-${item.uid}" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-md py-2.5 transition shadow disabled:bg-gray-400" 
                        onclick="approveRequest('${item.uid}')">${item.status === '仮取り消し' ? '取消を承認する' : '承認する'}</button>
                </div>
            `).join('');
        }

        async function approveRequest(uid) {
            if(!confirm("この申請を承認しますか？")) return;
            const btn = document.getElementById(`btn-${uid}`);
            btn.disabled = true;
            showLoading(true, "承認処理中...");
            try {
                const json = await fetchGasPost('approve', { uid: uid, execUserName: currentUser.name, execRole: currentUser.role });
                if (json.status === 'success') { 
                    btn.innerText = "✅ 承認完了！";
                    btn.classList.replace('bg-blue-600', 'bg-green-500');
                    setTimeout(() => fetchListData(), 1000);
                }
                else throw new Error(json.message);
            } catch (e) { 
                alert("エラー: " + e.message); 
                btn.disabled = false;
            }
            finally { showLoading(false); }
        }

        async function cancelRequest(uid) {
            if(!confirm("この申請を取り消しますか？")) return;
            showLoading(true, "処理中...");
            try {
                const json = await fetchGasPost('cancel', { uid: uid });
                if (json.status === 'success') { alert("取消を申請しました"); fetchListData(); }
                else throw new Error(json.message);
            } catch (e) { alert("エラー: " + e.message); }
            finally { showLoading(false); }
        }
    </script>
</body>
</html>
